<script type="module">

import { questions } from "./questions.js";

const report =
JSON.parse(
localStorage.getItem("satMathleReport")
);

if(!report){

location.href="assessment.html";

}

const score =
report.score;
const gauge=document.getElementById("scoreGauge");
const gaugeScore=document.getElementById("gaugeScore");
gauge.style.setProperty("--deg",((score-200)/600*360)+"deg");
gaugeScore.textContent=score;
document.getElementById("bigScore").textContent =
score;

document.getElementById("correctStat").textContent =
report.correct;

document.getElementById("incorrectStat").textContent =
report.incorrect;

document.getElementById("skippedStat").textContent =
report.skipped;

document.getElementById("timeStat").textContent =
report.elapsedTime;

const scoreCard =
document.getElementById("scoreCard");

const scoreText =
document.getElementById("scoreText");

const percentile =
document.getElementById("percentile");

let band = 0;if(score<400){

band=0;

scoreCard.classList.add("score0");

scoreText.textContent="Needs Significant Improvement";

percentile.textContent="Below the 25th Percentile";

}
else if(score<500){

band=1;

scoreCard.classList.add("score1");

scoreText.textContent="Developing";

percentile.textContent="25th Percentile";

}
else if(score<550){

band=2;

scoreCard.classList.add("score2");

scoreText.textContent="Building Skills";

percentile.textContent="40th Percentile";

}
else if(score<600){

band=3;

scoreCard.classList.add("score3");

scoreText.textContent="Making Progress";

percentile.textContent="55th Percentile";

}
else if(score<650){

band=4;

scoreCard.classList.add("score4");

scoreText.textContent="Average";

percentile.textContent="70th Percentile";

}
else if(score<700){

band=5;

scoreCard.classList.add("score5");

scoreText.textContent="Good";

percentile.textContent="82nd Percentile";

}
else if(score<730){

band=6;

scoreCard.classList.add("score6");

scoreText.textContent="Very Good";

percentile.textContent="90th Percentile";

}
else if(score<760){

band=7;

scoreCard.classList.add("score7");

scoreText.textContent="Excellent";

percentile.textContent="95th Percentile";

}
else{

band=8;

scoreCard.classList.add("score8");

scoreText.textContent="Elite Performance";

percentile.textContent="99th Percentile";

}

const reviewContainer = document.getElementById("reviewContainer");
const emojiGrid = document.getElementById("emojiGrid");
const skillAnalysis = document.getElementById("skillAnalysis");

const questionEmojis = [
    "🥇",
    "🥓",
    "🌲",
    "🧊",
    "🦎",
    "🫐",
    "🍇",
    "🧡",
    "🦩",
    "🌶️"
];

reviewContainer.innerHTML = "";
emojiGrid.innerHTML = "";

let early = 0;
let middle = 0;
let advanced = 0;

questions.forEach((q,index)=>{

    const value = report.values[index];

    // ---------- Review Cards ----------

    if(value !== 1){

        const reviewCard = document.createElement("div");

        reviewCard.className = "reviewCard";

        reviewCard.innerHTML = `
            <div class="badge">
                Difficulty ${q.difficulty}
            </div>

            <h3>💣 ${q.topic}</h3>

            <h4>${q.subtopic}</h4>

            <div>
                Lesson:
                <b>${q.lesson}</b>
            </div>

            <a
                class="lessonButton"
                href="${q.pdf}"
                target="_blank">
                📘 Review Lesson
            </a>
        `;

        reviewContainer.appendChild(reviewCard);

    }

    // ---------- Emoji Cards ----------

    let statusEmoji="";
    let statusText="";

    if(value===1){
        statusEmoji="✅";
        statusText="Correct";
    }
    else if(value===0){
        statusEmoji="⏭️";
        statusText="Skipped";
    }
    else{
        statusEmoji="💣";
        statusText="Incorrect";
    }

    const emojiCard=document.createElement("div");

    emojiCard.className="emojiCard";

    emojiCard.innerHTML=`
        <div class="emoji">${questionEmojis[index]}</div>

        <div class="emojiTitle">
            ${statusEmoji} ${statusText}
        </div>

        <div class="emojiScore">
            Question ${index+1}<br>
            ${q.topic}
        </div>
    `;

    emojiGrid.appendChild(emojiCard);

    if(index<3 && value!==1) early++;
    else if(index<7 && value!==1) middle++;
    else if(value!==1) advanced++;

});

let analysis=""; 
document
.getElementById("printButton")
.onclick=()=>{

window.print();

};

document
.getElementById("shareButton")
.onclick=()=>{

if(navigator.share){

navigator.share({

title:"SAT Mathle Results",

text:
`I scored ${score} on SAT Mathle!`,

url:window.location.href

});

}
else{

navigator.clipboard.writeText(
window.location.href
);

alert(
"Report link copied to clipboard."
);

}

};

</script>
