<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAT Mathle | Organization Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#edf4ff,#d8e7ff);

}

.login-card{

width:430px;

background:white;

padding:55px;

border-radius:18px;

box-shadow:0 25px 60px rgba(0,0,0,.15);

}

.logo{

text-align:center;

font-size:38px;

font-weight:900;

color:#1d4ed8;

margin-bottom:12px;

}

.subtitle{

text-align:center;

color:#64748b;

margin-bottom:40px;

line-height:1.6;

}

label{

display:block;

font-weight:700;

margin-bottom:10px;

color:#0f172a;

}

input{

width:100%;

padding:17px;

border:1px solid #d5dce6;

border-radius:10px;

margin-bottom:22px;

font-size:16px;

transition:.3s;

}

input:focus{

outline:none;

border-color:#2563eb;

box-shadow:0 0 0 4px rgba(37,99,235,.15);

}

button{

width:100%;

padding:18px;

background:#2563eb;

border:none;

color:white;

font-size:18px;

font-weight:700;

border-radius:10px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

}

.links{

margin-top:30px;

text-align:center;

}

.links a{

display:block;

margin:10px 0;

text-decoration:none;

color:#2563eb;

font-weight:600;

}

.footer{

margin-top:35px;

text-align:center;

font-size:13px;

color:#94a3b8;

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">

<img
    src="/images/satmathle-logo.png"
    alt="SAT Mathle Logo"
    style="height:92px;">

</div>

<div class="subtitle">

Organization Portal

<br>

Schools • Districts • Tutoring Organizations

</div>

<form>

<label>

Organization Email

</label>

<input

type="email"

placeholder="organization@email.com"

required

>

<label>

Password

</label>

<input

type="password"

placeholder="Password"

required

>

<button

type="submit"

onclick="location.href='dashboard.html'; return false;"

>

Log In

</button>

</form>

<div class="links">

<a href="#">

Forgot Password?

</a>

<a href="#">

Request Organization Access

</a>

</div>

<div class="footer">

© 2026 SAT Mathle™

</div>

</div>

</body>

</html>
